version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: buffet-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-buffet_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: buffet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: buffet-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:5i1hlq%26nKBUUv2@postgres:5432/buffet_db?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: buffet-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
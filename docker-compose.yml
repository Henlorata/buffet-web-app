version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: buffet-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_final:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: buffet-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    image: buffet-backend:latest
    container_name: buffet-backend
    restart: on-failure
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=5000
    depends_on:
      - postgres
      - redis

  frontend:
    image: buffet-frontend:latest
    container_name: buffet-frontend
    restart: on-failure
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data_final:
  redis_data: